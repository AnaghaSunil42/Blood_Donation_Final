{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0 bg-dark text-white">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock display-4 text-secondary"></i>
                        <h3 class="fw-bold mt-2">Admin Portal</h3>
                        <p class="text-secondary">Authorized personnel only</p>
                    </div>

                    <form method="POST" action="{{ url_for('auth.login_admin') }}">
                        <div class="mb-3">
                            <label class="form-label fw-medium text-light">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-secondary border-secondary text-white"><i
                                        class="bi bi-person"></i></span>
                                <input type="text" name="username"
                                    class="form-control border-secondary text-white bg-dark" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium text-light">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-secondary border-secondary text-white"><i
                                        class="bi bi-key"></i></span>
                                <input type="password" name="password"
                                    class="form-control border-secondary text-white bg-dark" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-light w-100 py-2 fw-bold text-dark">Access
                            Dashboard</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
