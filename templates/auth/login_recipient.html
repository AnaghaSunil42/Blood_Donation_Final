{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-hospital text-danger display-4"></i>
                        <h3 class="fw-bold mt-2">Recipient Login</h3>
                        <p class="text-muted">Access our blood request network</p>
                    </div>

                    <form method="POST" action="{{ url_for('auth.login_recipient') }}">
                        <div class="mb-3">
                            <label class="form-label fw-medium">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                                <input type="email" name="email" class="form-control" required
                                    placeholder="recipient@example.com">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-shield-lock"></i></span>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">Login</button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0 text-muted">Need to request blood? <a
                                href="{{ url_for('auth.register_recipient') }}"
                                class="text-danger text-decoration-none fw-bold">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
