{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-body p-md-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-journal-medical text-danger display-4"></i>
                        <h3 class="fw-bold mt-2">Register as Recipient</h3>
                        <p class="text-muted">Create an account to submit blood requests</p>
                    </div>

                    <form method="POST" action="{{ url_for('auth.register_recipient') }}" class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Patient / Contact Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Email Address</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-medium">Hospital / Clinic Name</label>
                            <input type="text" name="hospital_name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Contact Number</label>
                            <input type="tel" name="contact_number" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-medium">Blood Group Required</label>
                            <select name="blood_group_required" class="form-select border-danger" required>
                                <option value="">Select...</option>
                                {% for bg in blood_groups %}
                                <option value="{{ bg }}">{{ bg }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Units Required (Initial estimate)</label>
                            <input type="number" name="units_required" class="form-control" min="1" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-medium">Hospital Location (City / Area)</label>
                            <input type="text" name="location" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-medium">Password</label>
                            <input type="password" name="password" class="form-control" required minlength="6">
                        </div>

                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-danger w-100 py-2 fw-bold fs-5">Register
                                Account</button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0 text-muted">Already registered? <a href="{{ url_for('auth.login_recipient') }}"
                                class="text-danger text-decoration-none fw-bold">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
